<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f0d"/>
      <stop offset="100%" stop-color="#030504"/>
    </linearGradient>

    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#72d638"/>
      <stop offset="50%" stop-color="#38a825"/>
      <stop offset="100%" stop-color="#1e6b18"/>
    </linearGradient>

    <linearGradient id="curveGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#24781b"/>
      <stop offset="60%" stop-color="#49bd28"/>
      <stop offset="100%" stop-color="#84e043"/>
    </linearGradient>

    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#329e20"/>
      <stop offset="100%" stop-color="#72d638"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>

  <!-- Top arching S curve -->
  <path d="M 130 180 C 130 80, 260 40, 380 75 C 290 55, 170 100, 180 200 C 188 280, 420 220, 400 370 C 380 490, 240 480, 120 420 C 230 460, 340 450, 345 370 C 350 280, 130 300, 130 180 Z" fill="url(#curveGrad)" />

  <!-- 3 Bar Chart Columns inside upper arch -->
  <rect x="225" y="180" width="28" height="50" rx="4" fill="url(#barGrad)" />
  <rect x="268" y="150" width="28" height="80" rx="4" fill="url(#barGrad)" />
  <rect x="311" y="115" width="28" height="115" rx="4" fill="url(#barGrad)" />

  <!-- Bottom Leaf Curve -->
  <path d="M 125 235 C 125 235, 230 280, 335 420 C 220 460, 140 370, 125 235 Z" fill="url(#leafGrad)" />
  <!-- Leaf Center Vein -->
  <path d="M 165 290 C 220 340, 280 390, 325 415" fill="none" stroke="#0a0f0d" stroke-width="4" stroke-linecap="round" opacity="0.6" />
</svg>
